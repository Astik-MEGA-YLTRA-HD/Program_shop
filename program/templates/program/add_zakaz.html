<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Создание заказов — CRM</title>
<style>
:root {
    --bg-main: #e5e7eb;
    --bg-sidebar: #d1d5db;
    --bg-card: #ffffff;
    --accent: #4f46e5;
    --accent-light: #6366f1;
    --text-main: #1f2937;
    --text-muted: #4b5563;
    --danger: #ef4444;
}

/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: var(--bg-sidebar);
    padding: 40px 18px;
    position: fixed;
    height: 100%;
    border-right: 1px solid rgba(0,0,0,0.08);
}

.sidebar h2 {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 35px;
}

.sidebar ul { list-style:none; }
.sidebar li { margin-bottom: 14px; }

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 14px;
    padding: 6px 4px;
    border-radius: 6px;
    transition: 0.25s ease;
}

.sidebar a:hover { color: var(--text-main); background: rgba(99,102,241,0.1); }

.sidebar svg {
    width: 18px;
    height: 18px;
    stroke-width: 2;
    stroke: var(--accent-light);
    transition: 0.25s ease;
}

.sidebar a:hover svg { stroke: var(--accent); }

/* Main content */
.main {
    margin-left: 200px;
    width: 100%;
    padding: 50px 70px;
}

/* Page Title */
.page-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* Form */
form {
    background: var(--bg-card);
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    margin-bottom: 40px;
}

form label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: var(--text-main);
}

form input, form select {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.12);
    font-size: 14px;
    color: var(--text-main);
    background: var(--bg-card);
}

form button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-right: 12px;
}

form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99,102,241,0.5);
}

/* Table */
.table-wrapper {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 25px 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    margin-top: 20px;
}

table { width: 100%; border-collapse: collapse; }

th {
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding-bottom: 15px;
}

td {
    padding: 14px 0;
    border-top: 1px solid rgba(0,0,0,0.1);
    font-size: 14px;
}

tr:hover { background: rgba(99,102,241,0.05); }

/* Responsive */
@media (max-width: 900px) {
    body { flex-direction: column; }
    .sidebar { position: relative; width: 100%; height: auto; padding: 20px; }
    .main { margin-left:0; padding:30px 20px; }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Navigation</h2>
    <ul>
        <li><a href="/glavn/prodaj/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h18l-2 13H5L3 3z"/><path d="M16 21a2 2 0 100-4 2 2 0 000 4zM8 21a2 2 0 100-4 2 2 0 000 4z"/></svg>Продажа</a></li>
        <li><a href="/glavn/zakaz/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>Заказы</a></li>
        <li><a href="/glavn/postav/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-8 0v2"/><circle cx="12" cy="7" r="4"/></svg>Поставщики</a></li>
        <li><a href="/glavn/product/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 17l9 4 9-4"/><path d="M3 12l9 4 9-4"/></svg>Склад</a></li>
        <li><a href="/glavn/prod/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/></svg>Продажи</a></li>
        <li><a href="/glavn/cash/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>Касса</a></li>
        <li><a href="/glavn/contacts/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2V8z"/><path d="M3 8l9 6 9-6"/></svg>Контакты</a></li>
    </ul>
</div>

<div class="main">
    <div class="page-title">Создание заказов</div>

    <form method="post">
        {% csrf_token %}
        <label for="fio">ФИО Клиента:</label>
        <input type="text" name="fio" placeholder="ФИО Клиента" list="browsers" required />
        <datalist id="browsers">
            {% for i in data1 %}<option>{{ i.name }}</option>{% endfor %}
        </datalist>

        <label for="months">Срок рассрочки (месяцы):</label>
        <input type="text" name="m_count" placeholder="Количество месяцев" required />

        <label for="opl_date">Дата оплаты:</label>
        <input type="date" name="opl_date" value="{{ today|date:'Y-m-d' }}" required />

        <label for="vznos">Взнос:</label>
        <input type="number" name="vznos" placeholder="Взнос в руб." required />

        <div class="table-wrapper">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Название продукта</th>
                        <th>Стоимость</th>
                        <th>Количество шт.</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="orderRow">
                        <td><input type="text" name="product[]" placeholder="Название продукта" list="product" required />
                            <datalist id="product">{% for i in data2 %}<option>{{ i.product }}</option>{% endfor %}</datalist>
                        </td>
                        <td><input type="number" name="cen[]" placeholder="Цена в руб." required /></td>
                        <td><input type="number" min="1" name="count[]" placeholder="Кол-во шт." required /></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button type="button" onclick="addOrderRow()">+ Добавить позицию</button>
        <button type="submit">Создать заказ</button>
    </form>
</div>

<script>
function addOrderRow() {
    const table = document.getElementById("ordersTable").getElementsByTagName('tbody')[0];
    const newRow = table.insertRow();
    newRow.innerHTML = `
        <td><input type="text" name="product[]" placeholder="Название продукта" list="product" required></td>
        <td><input type="number" name="cen[]" placeholder="Цена в руб." required></td>
        <td><input type="number" min="1" name="count[]" placeholder="Кол-во шт." required></td>
    `;
}

// Установка текущей даты
document.querySelectorAll('input[name="opl_date"]').forEach(input => {
    input.value = new Date().toISOString().split('T')[0];
});
</script>

</body>
</html>
