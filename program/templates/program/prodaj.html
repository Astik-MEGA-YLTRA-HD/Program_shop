<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление магазином и заказами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-evenly;
            background-color: #444;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            padding: 1em;
            transition: all .3s ease-in-out;
        }
        
        nav a:hover {
            background-color: #555;
        }
        
        section {
            max-width: 80%;
            margin: auto;
            padding-top: 20px;
        }
        
        form input[type=text], select {
            width: 100%;
            height: 40px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            margin-bottom: 10px;
            padding-left: 10px;
        }
        
        button, .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        tr:nth-child(even){background-color: #f2f2f2;}
    </style>
</head>
<body>
    
    <!-- Шапка сайта -->
    <header>
        <h1>Продажа</h1>
    </header>
    
    <!-- Навигационное меню -->
    <nav>
        <ul>
            <li><a href="/glavn/prodaj/">Продажа на месте</a></li>
            <li><a href="/glavn/zakaz/">Рассрочка</a></li>
            <li><a href="/glavn/postav/">Поставщики</a></li>
            <li><a href="/glavn/product/">Склад</a></li>
            <li><a href="/glavn/prod/">Продажи</a></li>
            <li><a href="/glavn/cash/">Касса</a></li>
            <li><a href="/glavn/contacts/">Контакты</a></li>
        </ul>
    </nav>
    
    <!-- Основное содержимое страницы -->
    <section id="orders">
        <h2>Продажа на месте</h2>
        <form method="post">
            {% csrf_token %}
            <label for="clientName">ФИО клиента:</label>
                <input type="text" name="fio" placeholder="ФИО Клиента" list=browsers required><br>  
                <datalist id=browsers>  
                {% for i in data1 %}
                    <option> {{ i.name }}
                {% endfor %}
                </datalist><br>
            
            <label for="product">Продукт:</label>
                <td><input type="text" name="product" placeholder="Название продукта" list=product required></td>
                        <datalist id=product>  
                        {% for i in data2 %}
                            <option> {{ i.product }}
                        {% endfor %}
                        </datalist><br>

            <label for="product">Сумма в руб.:</label>
                <input type="text" name="cen" placeholder="Цена руб."><br>
            <br>

            <label for="product">Количество шт.</label>
                <input type="number" name="count" placeholder="Шт."><br>
            <br>
            
            <label for="product">Дата покупки:</label>
                <input type="date" name="prod_date" id="date" placeholder="дд.мм.гггг"><br>
            <br>
            
            <button type="submit">продать</button>
        </form>
        <script>
            const dateInput = document.getElementById('date');

                // Устанавливаем текущую дату в формате ISO (yyyy-mm-dd)
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
        </script>
    </section>
    
</body>
</html>
