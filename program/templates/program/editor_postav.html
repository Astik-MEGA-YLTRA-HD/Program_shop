<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
{% for i in data %}
<title>Редактирование заказа №{{ i.id }}</title>
{% endfor %}
<style>
:root {
    --bg-main: #e5e7eb;
    --bg-sidebar: #d1d5db;
    --bg-card: #ffffff;
    --accent: #4f46e5;
    --accent-light: #6366f1;
    --text-main: #1f2937;
    --text-muted: #4b5563;
    --danger: #ef4444;
}

/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: var(--bg-sidebar);
    padding: 40px 18px;
    position: fixed;
    height: 100%;
    border-right: 1px solid rgba(0,0,0,0.08);
}

.sidebar h2 {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 35px;
}

.sidebar ul { list-style:none; }
.sidebar li { margin-bottom: 14px; }

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 14px;
    padding: 6px 4px;
    border-radius: 6px;
    transition: 0.25s ease;
}

.sidebar a:hover { color: var(--text-main); background: rgba(99,102,241,0.1); }

.sidebar svg {
    width: 18px;
    height: 18px;
    stroke-width: 2;
    stroke: var(--accent-light);
    transition: 0.25s ease;
}

.sidebar a:hover svg { stroke: var(--accent); }

/* Main content */
.main {
    margin-left: 200px;
    width: 100%;
    padding: 50px 70px;
}

.main h2 {
    margin-bottom: 25px;
    font-size: 20px;
    font-weight: 500;
}

/* Form styling */
form {
    background: var(--bg-card);
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 500px;
}

form label {
    font-weight: 500;
    color: var(--text-main);
}

form input[type="date"] {
    background: var(--bg-main);
    border: 1px solid rgba(0,0,0,0.12);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
}

form button {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: white;
    font-weight: 500;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99,102,241,0.5);
}

/* Responsive */
@media (max-width: 900px) {
    body { flex-direction: column; }
    .sidebar { position: relative; width: 100%; height: auto; padding: 20px; }
    .main { margin-left:0; padding:30px 20px; }
    form { width: 100%; }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Navigation</h2>
    <ul>
        <li><a href="/glavn/prodaj/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h18l-2 13H5L3 3z"/><path d="M16 21a2 2 0 100-4 2 2 0 000 4zM8 21a2 2 0 100-4 2 2 0 000 4z"/></svg>Продажа</a></li>
        <li><a href="/glavn/zakaz/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>Заказы</a></li>
        <li><a href="/glavn/postav/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-8 0v2"/><circle cx="12" cy="7" r="4"/></svg>Поставщики</a></li>
        <li><a href="/glavn/product/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 17l9 4 9-4"/><path d="M3 12l9 4 9-4"/></svg>Склад</a></li>
        <li><a href="/glavn/prod/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/></svg>Продажи</a></li>
        <li><a href="/glavn/cash/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>Касса</a></li>
        <li><a href="/glavn/contacts/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2V8z"/><path d="M3 8l9 6 9-6"/></svg>Контакты</a></li>
    </ul>
</div>

<div class="main">
    {% for i in data %}
    <h2>Редактирование заказа №{{ i.id }}</h2>
    {% endfor %}
    <form method="post">
        {% csrf_token %}
        <label>ФИО клиента: {{ data1.postav }}</label>
        <label>Общая сумма (оставшаяся): {{ data1.total_cen }}</label>
        
        <label for="opl_date">Дата привоза товара:</label>
        <input type="date" name="opl_date" value="{{ opl_date }}">
        
        <button type="submit">💾 Сохранить изменения</button>
    </form>
</div>

</body>
</html>
